name: Feature request
description: Propose a new capability or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Please describe the problem you're trying to
        solve before the solution — it helps us evaluate alternatives.
  - type: input
    id: repo
    attributes:
      label: Target repository / package
      description: Which repo would this land in?
      placeholder: "e.g. mnemom/aap"
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem does this solve? Who is affected, and how?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see happen?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed and why you set them aside.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, references, or anything else that helps frame the request.
    validations:
      required: false
