name: CodeQL Security Scan

on:
  workflow_call:
    inputs:
      languages:
        description: "Comma-separated CodeQL languages (e.g. javascript-typescript,python)"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      languages:
        description: "Comma-separated CodeQL languages (e.g. javascript-typescript,python)"
        required: true
        type: string

jobs:
  prepare:
    name: Prepare language matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Build matrix
        id: set-matrix
        run: |
          LANGS="${{ inputs.languages || 'javascript-typescript' }}"
          MATRIX=$(echo "$LANGS" | jq -Rc 'split(",")')
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  analyze:
    name: Analyze (${{ matrix.language }})
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@c10b8064de6f491fea524254123dbe5e09572f13 # v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@c10b8064de6f491fea524254123dbe5e09572f13 # v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@c10b8064de6f491fea524254123dbe5e09572f13 # v3
        with:
          category: "/language:${{ matrix.language }}"
